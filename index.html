e's July 2026 meeting, hosted by Parker Mayes and James Fredley, features founder stories and a tactical hot-seat Q&A with startup founders, operators, and investors discussing practical company-building advice.", "event_type": "", "topic_tags": ["Networking"], "source_url": "https://www.meetup.com/triangle-startup-collective/events/314339746/", "host": "Triangle Startup Collective", "editors_pick": false, "is_free": true, "stage_focus": ["Building", "Early_Traction", "Scaling"], "industry": ["no_specific_industry"], "format": ["networking"], "short_description": "Join the Triangle Startup Collective's July 2026 meeting for founder stories and a tactical hot-seat Q&A, where startup founders, operators, and investors share actionable company-building advice."}, {"id": "recG61lhJVNRYX52V", "name": "LiLa's Two Year Anniversary", "date": "2026-07-16", "friendly_date": "Thursday, July 16 from 4pm-7pm", "start_time": "16:00", "end_time": "19:00", "location": "", "city": "", "description": "LiLa celebrates its two-year anniversary with a social gathering at 121 East Parrish Street in Durham, marking the occasion since the organization's initial gathering.", "event_type": "", "topic_tags": [], "source_url": "https://www.lilalearning.org/event-details/lilas-two-year-anniversary", "host": "LiLa (Ladies Investing / Local Angels)", "editors_pick": false, "is_free": true, "stage_focus": ["Idea_Stage", "Building", "Early_Traction"], "industry": ["no_specific_industry"], "format": ["networking"], "short_description": "Join LiLa’s two-year anniversary celebration at 121 East Parrish Street in Durham, where the community gathers to commemorate its journey and connect with fellow supporters."}, {"id": "recwAXsh3vyXeqMEZ", "name": "Free Coworking Day @ American Underground", "date": "2026-07-16", "friendly_date": "Thursday, July 16 from 8am-5pm", "start_time": "08:00", "end_time": "5pm", "location": "324 Blackwell St suite 900", "city": "Durham", "description": "Free Coworking Day at American Underground Triangle's innovators, creators, and changemakers. This one's for you. We're opening our doors for a free day of coworking at American Underground.", "event_type": "", "topic_tags": ["Coworking"], "source_url": "https://lu.ma/p2j7l0nl", "host": "American Underground", "editors_pick": false, "is_free": true, "stage_focus": ["Idea_Stage", "Building"], "industry": ["no_specific_industry"], "format": ["networking"], "short_description": "Experience a free day of coworking at American Underground, designed for innovators, creators, and changemakers to connect and collaborate in a vibrant community space."}, {"id": "recYEqTFeCaxkqUjH", "name": "First Flight \"Itineraries\"", "date": "2026-07-21", "friendly_date": "Tuesday, July 21 from 12pm-1pm", "start_time": "12:00", "end_time": "13:00", "location": "First Flight Venture Center, 2 Davis Drive, Research Triangle Park, NC 27709", "city": "RTP", "description": "First Flight Venture Center is delighted to host lunchtime programs, \"Itineraries\" that offer a chance for members of the First Flight community and broader innovation ecosystem to learn about the work of early-stage science-focused companies, network and have some fun at the same time! An Itinerary is ‘a planned route or journey’ and this program gives companies often who are in residence at First Flight a forum in which to share where they are and where they plan to go.", "event_type": "", "topic_tags": [], "source_url": "https://www.ffvcnc.org/new-events/first-flight-itineraries/2026-7/21", "host": "First Flight Venture Center", "editors_pick": false, "is_free": true, "stage_focus": ["Idea_Stage", "Building", "Early_Traction"], "industry": ["no_specific_industry"], "format": ["networking"], "short_description": "\"Itineraries\" is a lunchtime event series at First Flight Venture Center where early-stage science-focused companies share their journeys, future plans, and connect with the innovation community."}, {"id": "recymBaVweSQsywmU", "name": "Test Flight Pitch Practice", "date": "2026-08-04", "friendly_date": "Tuesday, August 4 from 9:30am-10:30a", "start_time": "09:30", "end_time": "10:30", "location": "First Flight Venture Center, 2 Davis Drive, Research Triangle Park, NC 27709", "city": "RTP", "description": "Test Flight provides pitch practice for First Flight Venture Center companies, with invited audiences of Navigators, angel investors, and funding groups offering feedback.", "event_type": "", "topic_tags": ["Pitch Practice"], "source_url": "https://www.ffvcnc.org/new-events/test-flight/2026-8-4", "host": "First Flight Venture Center", "editors_pick": false, "is_free": true, "stage_focus": ["Idea_Stage", "Building", "Early_Traction"], "industry": ["no_specific_industry"], "format": ["pitch_practice"], "short_description": "Review Test Flight is a pitch practice event where First Flight Venture Center companies present to an audience of investors and funding groups for valuable feedback and networking opportunities."}, {"id": "rec4Qbhr6WB2KZAEJ", "name": "First Flight \"Itineraries\"", "date": "2026-08-18", "friendly_date": "Tuesday, August 18 from 12pm-1pm", "start_time": "12:00", "end_time": "13:00", "location": "First Flight Venture Center, 2 Davis Drive, Research Triangle Park, NC 27709", "city": "RTP", "description": "First Flight Venture Center is delighted to host lunchtime programs, \"Itineraries\" that offer a chance for members of the First Flight community and broader innovation ecosystem to learn about the work of early-stage science-focused companies, network and have some fun at the same time! An Itinerary is ‘a planned route or journey’ and this program gives companies often who are in residence at First Flight a forum in which to share where they are and where they plan to go.", "event_type": "", "topic_tags": ["Networking", "Tech & Product"], "source_url": "https://www.ffvcnc.org/new-events/first-flight-itineraries/2026-8/18", "host": "First Flight Venture Center", "editors_pick": false, "is_free": true, "stage_focus": ["Idea_Stage", "Building", "Early_Traction"], "industry": ["no_specific_industry"], "format": ["networking"], "short_description": "\"Itineraries\" is a lunchtime event series at First Flight Venture Center where early-stage science-focused companies share their journeys, future plans, and connect with the innovation community."}]; window.ORG_PROFILES = {"SCORE Raleigh": {"description": "SCORE Raleigh is the Wake County chapter of SCORE, the SBA-supported national nonprofit providing free, confidential mentoring to small business owners and entrepreneurs. The chapter has 50+ certified mentors—experienced business professionals and entrepreneurs—available for in-person and virtual appointments across Raleigh. Mentoring covers business planning, marketing, finance, operations, and startup basics. SCORE also offers free webinars and workshops. Services are free and confidential; mentors do not take equity.", "website": "https://www.score.org/raleigh", "address": "", "logo": null}, "SJF Ventures": {"description": "SJF Ventures is an impact-focused venture capital firm co-founded in 1999 and headquartered across Durham (NC), New York, and San Francisco. SJF has invested in 90+ companies and manages $435M+ across five funds. The firm backs high-growth companies in cleantech, health and wellness, workforce tech, and sustainable food and agriculture. SJF is a certified B Corporation and founding co-chair of Impact Capital Managers. The Durham office is the original headquarters and remains active.", "website": "https://sjfventures.com/", "address": "", "logo": null}, "First Flight Venture Center": {"description": "First Flight Venture Center's mission is to propel early-stage science companies through the delivery of comprehensive resources, and to empower innovators to transform good ideas into great successes.\n\n", "website": "https://www.ffvcnc.org/", "address": "", "logo": null}, "Raleigh-Durham Startup Co.": {"description": "Raleigh-Durham Startup Co. (RDSCo.) is a year-round nonprofit supporting Triangle founders through free events, workshops, and community. What began as Raleigh-Durham Startup Week (RDSW) — a 5-day April event with 100+ sessions and 2,500+ attendees — evolved in 2026 into a broader nonprofit umbrella with monthly workshops, a podcast (Build What Matters), and ongoing meetups. All events are free and volunteer-led.", "website": "https://www.raleighdurhamstartup.co", "address": "", "logo": null}, "Techstars": {"description": "Techstars is a worldwide network of mentorship-driven accelerators. Programs invest $120K+ in each cohort company in exchange for equity, providing mentorship, network access, and demo day exposure. Operates across many verticals and cities. Relevant to Triangle founders as a national program.", "website": "https://www.techstars.com/", "address": "", "logo": null}, "IDEA Fund Partners": {"description": "IDEA Fund Partners is a seed and early-stage venture capital firm with offices in Durham, NC and Orlando, FL, investing in technology companies across the Southeast and Mid-Atlantic. The firm spun out of the NC IDEA Foundation in 2007 and focuses on software, medical devices, and other technology sectors. IDEA Fund frequently backs university spinouts from Triangle research institutions and is currently investing from its third fund.", "website": "https://www.ideafundpartners.com/", "address": "", "logo": null}, "echo": {"description": "echo is a community-led nonprofit empowering entrepreneurs of all ages and stages in Durham, NC. They offer youth programs (Future Founders, Shiboka, Teens Tackle), adult business workshops (Routes to Results accelerator), mentorship, and regular community events. Now moving to a new Downtown Durham space. 580+ entrepreneurs supported and 128+ businesses launched.", "website": "https://www.echo-nc.org/", "address": "404 Hunt St. Suite 500 Durham, NC 27701", "logo": null}, "Morning Grind": {"description": "A morning series for Triangle entrepreneurs to learn, connect, and grow through interactive talks, networking, and practical insights.", "website": "https://morninggrindseries.com/", "address": "", "logo": null}, "NAWBO Greater Raleigh": {"description": "NAWBO Greater Raleigh is the local chapter of the National Association of Women Business Owners, supporting women entrepreneurs across Wake County and the broader Triangle. The chapter provides monthly programming, educational sessions covering marketing, microloans, LinkedIn, and business basics, plus networking events, advocacy resources, and peer community for women who own businesses at any stage. NAWBO Raleigh holds an SBA Strategic Alliance Memorandum, giving members additional federal small business resources.", "website": "https://nawbo-raleigh.org/", "address": "", "logo": null}, "Y Combinator": {"description": "Y Combinator is the world's most prestigious startup accelerator, providing $500K in funding plus MFN on a $1.5M SAFE, mentorship, and a powerful global alumni network. 10-week programs run twice per year in San Francisco. Many Triangle founders have participated. Highly competitive.", "website": "https://www.ycombinator.com/", "address": "", "logo": null}, "Bullhouse Ventures": {"description": "Bullhouse Ventures is a Durham-based 'founder living room' — a coworking and event space combined with an active investment program. Founders Austin Armstrong and Austin Carroll write individual checks and form SPVs for portfolio companies, focusing on fintech, sports tech, health tech, defense tech, and martech. Free coworking space is offered to companies they invest in. Launched publicly at RDSW 2026 as part of Durham's talent retention strategy.", "website": "https://bullhouseventures.com/", "address": "601A Foster St, Durham NC 27701", "logo": null}, "NC TECH": {"description": "NC TECH (North Carolina Technology Association) fosters growth and innovation in NC's technology sector, serving a network of corporations, investors, SMBs, startups, nonprofits, and institutional stakeholders. Offers an NC TECH for Startups membership tier with increased visibility, business connections, and ecosystem perks.", "website": "https://www.nctech.org/", "address": "", "logo": null}, "Pappas Capital": {"description": "Pappas Capital is a global venture capital and commercial development firm founded in 1994 in Durham, NC by A.M. Pappas. The firm invests exclusively in life sciences—biopharmaceuticals, medical devices, and drug delivery technologies—through its Pappas Ventures fund vehicle, alongside specialized fund management and translational medicine partnerships with research universities. With 30+ years operating from Durham, Pappas Capital is one of the Triangle's most established life sciences VC firms.", "website": "https://www.pappas-capital.com/", "address": "", "logo": null}, "American Underground": {"description": "American Underground is a tech hub and coworking space in downtown Durham. With 25,000+ sq ft across multiple locations (including a 2026 return to American Tobacco Campus), AU supports 275+ startups with coworking, private offices, community events, pitch competitions, workshops, and access to top Triangle tech leaders.", "website": "https://americanunderground.com/", "address": "324 Blackwell St Suite 900, Durham, NC 27701", "logo": null}, "Wake Tech Entrepreneurship & Small Business Center": {"description": "Wake Technical Community College's Entrepreneurship & Small Business Center is a state-funded resource center providing free and low-cost business counseling, workshops, and support to entrepreneurs and small business owners in Wake County. Located on the Western Wake Campus in Cary, the center offers one-on-one counseling on business planning, marketing, legal structure, and financing, as well as the LaunchWakeCounty training and mentoring program for local entrepreneurs. Part of the NC Small Business Center Network (59 centers across NC community colleges).", "website": "https://www.waketech.edu/programs-courses/non-credit/build-business/small-business-center", "address": "", "logo": null}, "Lila Learning": {"description": "", "website": "", "address": "", "logo": null}, "Duke Innovation & Entrepreneurship": {"description": "Duke Innovation & Entrepreneurship (Duke I&E) is Duke University's hub for innovation and startup programs, launched in 2010. Duke I&E offers the Melissa & Doug Entrepreneurs program (Duke's flagship student accelerator), entrepreneurship certificates, pitch competitions, venture funding access, and the Christensen Family Center for Innovation. The hub connects Duke founders with Durham's broader startup ecosystem. Programs are primarily available to current Duke students, faculty, and alumni; Demo Days and select events are open to the public.", "website": "https://entrepreneurship.duke.edu/", "address": "", "logo": null}, "NC Tweener Fund": {"description": "NC Tweener Fund (formerly Triangle Tweener Fund, launched 2022) is a rolling index-style fund investing in early-stage, high-growth North Carolina startups with $1M+ ARR or 10+ employees. General Partners Scot Wingo and Robbie Allen invest in 12–18 companies per quarter. The fund has invested $10M+ across 160+ portfolio companies, was ranked #1 most active fund in the Southeast by PitchBook in 2023, and expanded statewide in partnership with NC IDEA Foundation in 2026. The ecosystem includes the Tweener List (tracked companies), Tweener Times newsletter, Tweener Talks podcast, and Tweener Madness pitch competition.", "website": "https://www.tweenerfund.com/", "address": "", "logo": null}, "Cofounders Capital": {"description": "Cofounders Capital is a Cary, NC-based seed fund focused on enterprise SaaS and B2B technology startups. Founded by serial entrepreneur David Gardner, the fund includes 90+ advisors and mentors. Named North Carolina's most active venture fund by CB Insights in 2021. Has backed notable Triangle companies including early-stage Pendo. Invests primarily at pre-seed and seed.", "website": "https://www.cofounderscapital.com/", "address": "", "logo": null}, "Hatteras Venture Partners": {"description": "Hatteras Venture Partners is a Durham-based healthcare venture capital firm founded in 2000, specializing in seed and early-stage investments in life sciences. The firm backs companies across biopharmaceuticals, medical devices, diagnostics, healthcare IT, and digital health. Hatteras has raised multiple funds totaling $200M+. The firm invests primarily in the Southeast with a strong Triangle presence and has close ties to Duke and UNC academic spinouts.", "website": "https://hatterasvp.com/", "address": "", "logo": null}, "NC SBTDC": {"description": "The NC Small Business and Technology Development Center (SBTDC), administered by NC State University on behalf of the UNC System, provides free and confidential management counseling, business development programs, and funding resources to startups and growing businesses across all 100 NC counties. Part of the national SBDC network with SBA support.", "website": "https://sbtdc.org/", "address": "", "logo": null}, "NC IDEA Foundation": {"description": "NC IDEA is a private 501(c)(3) foundation that advances entrepreneurship across North Carolina through grant programs: MICRO ($10K for early validation), SEED ($50K for scaling), ECOSYSTEM (for support orgs), and ENGAGE (event sponsorship). Since 2006, has awarded $26M+ in grants to startups statewide. Runs semi-annual grant cycles.", "website": "https://ncidea.org/", "address": "", "logo": null}, "RIoT": {"description": "RIoT (Research Triangle IoT) runs a free, 12-week accelerator program for technology-enabled startups across any industry, with no equity taken and no cost to participants. Cohorts run three times per year and are hosted in-person in North Carolina. The program offers weekly workshops, one-on-one mentorship from a network of 200+ mentors and corporate partners, access to an engineering prototyping lab, and connections to an IoT consortium of 80+ companies. Originally IoT-focused, the program is now industry-agnostic. Alumni receive lifetime support and access to a Founders' Roundtable peer network. RIoT is a 501(c)(3) nonprofit.", "website": "https://riot.org/startup-accelerator/", "address": "", "logo": null}, "Innovate Carolina": {"description": "Innovate Carolina is UNC-Chapel Hill's hub for innovation, entrepreneurship, and economic development. It connects faculty, students, and alumni with resources to launch ventures, including the Launch Chapel Hill student accelerator, the Innovate Carolina Junction coworking space in downtown Chapel Hill, and a cross-campus network of programs.", "website": "https://innovate.unc.edu/", "address": "136 E Rosemary St, Chapel Hill, NC 27514", "logo": null}, "CED": {"description": "The Council for Entrepreneurial Development (CED), founded in 1984, is the largest and longest-running entrepreneur network in the country. Based in RTP, CED connects founders, investors, and innovators through programs like GRO Incubator, Founder Mentoring, and Connections to Capital, plus the annual Venture Connect conference.", "website": "https://cednc.org/", "address": "600 Park Offices Dr Ste. 100, Research Triangle Park, NC 27709", "logo": null}, "LiLa (Ladies Investing / Local Angels)": {"description": "Ladies Investing / Local Angels (LiLa) is an educational group that meets regularly to share learnings and insights on early stage business investment in the Triangle (NC) and beyond.\n\n \n\nOur mission is to empower women through knowledge, fostering growth and success in the business world.", "website": "https://www.lilalearning.org/", "address": "", "logo": null}, "Raleigh Startup Founder 101": {"description": "Raleigh Startup Founder 101 is a Meetup-based community for aspiring and early-stage tech entrepreneurs in the Raleigh area, with 1,800+ members. Events are free and cover startup fundamentals — legal basics, fundraising, pitching, product-market fit, and go-to-market strategy — through workshops, Q&As with founders and investors, and informal networking. The group emphasizes practical, practitioner-led learning from people who have built and exited companies.", "website": "https://www.meetup.com/raleigh-startup-founder-101/", "address": "", "logo": null}, "SCORE Chapel Hill Durham": {"description": "SCORE Chapel Hill Durham is the SCORE chapter serving Durham, Chapel Hill, and surrounding Orange County, providing free, confidential one-on-one business mentoring from experienced volunteer mentors. Like SCORE Raleigh, it covers all aspects of starting and growing a business. The chapter serves a distinct geographic audience from the Raleigh chapter, with particular proximity to Duke, UNC, and NCCU founders.", "website": "https://chapelhilldurham.score.org/", "address": "", "logo": null}, "Durham Tech Small Business Center": {"description": "Durham Technical Community College's Small Business Center supports for-profit and nonprofit startups and entrepreneurs with free information, counseling, and tools covering business planning, marketing, legal, accounting, and financial management.", "website": "https://www.durhamtech.edu/small-business-center", "address": "", "logo": null}, "Splat Space": {"description": "Splat Space is a member-supported 501(c)(3) nonprofit makerspace and hackerspace in downtown Durham, incorporated as Durham Makerspace and opened in September 2010. The 2,600 sq ft space at 800 N. Mangum St. gives roughly 100 members access to tools, machines, and workshop space for hardware projects, prototyping, electronics, fabrication, and creative tech. Members include engineers, artists, hobbyists, and early-stage hardware founders. Monthly membership fees support the space; no application process required.", "website": "https://www.splatspace.org/", "address": "", "logo": null}, "Triangle Business Journal": {"description": "Triangle Business Journal covers business news for the Raleigh-Durham-Chapel Hill metro. An important resource for founders tracking funding rounds, company news, and ecosystem developments.", "website": "https://www.bizjournals.com/triangle/", "address": "", "logo": null}, "DareToShift": {"description": "Most people network. We build friendships. Most events end when the venue closes. Ours keep going. Most communities optimize for reach. We optimize for depth.\n\nDareToShift exists because the loneliness of building is real—and it doesn’t have to be.\n\nWe believe the support system is the strategy. That the right conversation at the right moment changes everything. That the person next to you at a picnic might be your next co-founder, investor, or best friend.\n\nWe’re not a conference. Not a networking group. Not a mastermind.\n\nWe’re a community of founders, funders, builders, and operators who take their work seriously and their people even more seriously. We break bread, throw parties, host game nights, do rooftops, and build real relationships that outlast any business card.\n\nIf you chose the harder, realer, more interesting path…this is your room.\n\nLearn more and connect at DareToShift.com", "website": "https://www.meetup.com/daretoshift/", "address": "", "logo": null}, "NC Biotechnology Center": {"description": "The North Carolina Biotechnology Center is a state-supported nonprofit that connects university researchers, startups, job seekers, and industry in the life sciences sector. Headquartered in Research Triangle Park with offices across the state, it offers grants, business loans, and awards to emerging biotech ventures.", "website": "https://www.ncbiotech.org/", "address": "", "logo": null}, "Raleigh Founded": {"description": "Raleigh Founded is a membership-based coworking and community space for startups, remote workers, and entrepreneurs. Operates multiple locations across Raleigh (including North Street and Centennial Campus). Hosts networking events, workshops, fireside chats, and serves as a venue for ecosystem events.", "website": "https://www.raleighfounded.com/", "address": "509 North Street, Raleigh NC 27603", "logo": null}, "Bull City Venture Partners": {"description": "Bull City Venture Partners is a Durham-based early-stage venture capital firm founded in 2012, investing in B2B software companies in the Southeast and Mid-Atlantic, with a strong focus on the Research Triangle. BCVP backs companies at Seed and Series A across cloud computing, DevOps, fintech, health technology, and e-commerce. The firm has made 75+ investments and is backed by Cisco Investments as an LP. BCVP is actively involved in the Triangle startup community.", "website": "https://www.bcvp.com/", "address": "", "logo": null}, "CED (Center for Entrepreneurial Development)": {"description": "", "website": "", "address": "", "logo": null}, "Carolina Angel Network": {"description": "Carolina Angel Network connects UNC alumni, donors, and friends of UNC to early-stage companies with a Tar Heel tie (founders, researchers, or faculty with a UNC connection). The network syndicates investment opportunities through Special Purpose Vehicles (SPVs), requiring accredited investor status. CAN evaluates 4–6 investment opportunities per year with formal due diligence. Members review investment documents and diligence memos before making individual investment decisions. The network also runs a Venture Fellowship program for training new angel investors.", "website": "https://www.carolinaangelnetwork.com/", "address": "", "logo": null}, "Daring Studios": {"description": "Daring Studios is a strategic creative studio guiding solopreneurs, freelancers, founders, and creatives through inflection points in your solo business.  ", "website": "https://www.daringstudios.com/", "address": "", "logo": null}, "Smith Anderson": {"description": "Smith Anderson is one of North Carolina's largest law firms (170+ attorneys), based in Raleigh and specializing in corporate, technology, venture capital, M&A, securities, and IP law for growth-stage companies and investors. The firm's Venture Capital practice is ranked among the best in the country by Best Law Firms, having represented clients in 500+ venture finance transactions since 2020. Smith Anderson routinely represents both Triangle startups and the VC funds investing in them.", "website": "https://www.smithlaw.com/", "address": "", "logo": null}, "Triangle Startup Collective": {"description": "Triangle Startup Collective is a Raleigh-Durham-Chapel Hill meetup community for founders and aspiring entrepreneurs. Regular events include networking, workshops, pitch practice, and idea-sharing sessions focused on technology, business growth, and startup fundamentals.", "website": "https://www.meetup.com/triangle-startup-collective/", "address": "", "logo": null}, "Wyrick Robbins": {"description": "Wyrick Robbins is a Raleigh-based law firm specializing in corporate, technology, and securities law with a deep focus on startup and venture-backed company representation. A well-known Triangle legal resource for founders navigating formation, fundraising, and exits.", "website": "https://www.wyrick.com/", "address": "", "logo": null}, "NC State Entrepreneurship Clinic": {"description": "NC State's Entrepreneurship Clinic at the Poole College of Management pairs student consultants with real startup entrepreneurs for hands-on advising. Also runs the Andrews Launch Accelerator, a 14-week equity-free accelerator (May-August) for early-stage ventures with a focus on customer discovery and product-market fit.", "website": "https://entrepreneurshipclinic.ncsu.edu/", "address": "", "logo": null}, "Founder Institute": {"description": "Founder Institute is the world's largest pre-seed startup accelerator, operating in 200+ cities globally. Runs cohort-based programs to help early-stage founders develop their ideas, build teams, and launch ventures. Relevant to Triangle founders as a structured program with a local chapter.", "website": "https://fi.co/", "address": "", "logo": null}, "GrepBeat": {"description": "GrepBeat is a media nonprofit that covers North Carolina startups and their founders.", "website": "https://grepbeat.com/", "address": "121 East Parrish Street, Durham, NC 2770", "logo": null}, "WRAL TechWire": {"description": "WRAL TechWire is the Triangle's primary technology and startup news publication, founded in 2002 and published by Capitol Broadcasting Co. in Raleigh. Now in its 23rd year, TechWire provides daily coverage of NC startup funding rounds, executive moves, industry events, policy, and ecosystem trends through articles, newsletters, and a curated Startup Guide organized into resource sections for founders. TechWire is the de facto publication of record for Triangle startup news, reaching tens of thousands of subscribers.", "website": "https://wraltechwire.com/", "address": "", "logo": null}, "Research Triangle Cleantech Cluster": {"description": "The Research Triangle Cleantech Cluster (RTCC) is an industry-funded, industry-led initiative that accelerates cleantech innovation in the Triangle by facilitating relationships among corporations, startups, researchers, government agencies, and nonprofits. The cluster counts 350+ member companies ranging from Fortune 500 participants (ABB, Cisco, Duke Energy, SAS, Siemens, Schneider Electric) to early-stage startups. RTCC focuses on smart grid, smart water, and sustainable transportation. Founders in clean energy, climate tech, or sustainability can use RTCC for corporate introductions, ecosystem navigation, and policy engagement.", "website": "https://www.researchtrianglecleantech.org/", "address": "", "logo": null}, "RTP Angel Fund": {"description": "RTP Angel Fund (formerly Triangle Angel Partners) is a member-managed angel investment fund that invests in early-stage ventures—pre-seed, seed, and Series A—primarily in the Research Triangle region of North Carolina, with broader Southeast interest. The fund evaluates opportunities across tech and life sciences through a structured diligence process: application, pre-screen call, Screening Committee pitch, member meeting, due diligence, and member vote. Founded by Craig Stone in 2012; rebranded from Triangle Angel Partners to RTP Angel Fund circa 2023.", "website": "https://www.rtpangelfund.com/", "address": "", "logo": null}, "Launch Chapel Hill": {"description": "Launch Chapel Hill is a startup accelerator co-founded in 2013 by UNC-Chapel Hill, the Town of Chapel Hill, Orange County Economic Development, and the Downtown Partnership. It runs two cohort cycles per year plus a KPMG-sponsored accelerator track (6 weeks, 10–12 teams per cohort) and free student summer cohorts. Participants receive mentorship from Entrepreneurs-in-Residence, weekly workshops, access to coworking space in downtown Chapel Hill, and 1:1 advising. Over 190 companies supported; portfolio has collectively raised $100M+. No equity taken.", "website": "https://www.launchchapelhill.com/", "address": "", "logo": null}, "gener8tor": {"description": "gener8tor is a nationally-ranked startup accelerator operating in multiple cities, running 12-week programs with $100K investment. They also run gBETA, a free 7-week pre-accelerator. Relevant to Triangle founders as a national program with Southeastern presence.", "website": "https://www.gener8tor.com/", "address": "", "logo": null}, "Morningstar Law Group": {"description": "Morningstar Law Group is a Raleigh-based business law firm founded in 2012 with a recognized focus on startups, entrepreneurs, and technology companies. The firm covers corporate formation, IP and technology law, venture financing, FDA and healthcare regulatory compliance, and government disputes. Morningstar's attorneys work with pre-commercial and early-commercial startups in software, life sciences, and biotech. The firm is Chambers USA–recognized and serves clients across North Carolina.", "website": "https://morningstarlawgroup.com/", "address": "", "logo": null}, "Innovate Durham": {"description": "Innovate Durham is a 16-week cohort program co-run by the City of Durham, Durham County, and Forward Cities through the E3 Durham initiative. The program pairs local entrepreneurs and innovators with City and County government departments, turning Durham's municipal operations into a live testing ground for new technologies, products, and services. Participants gain access to city data, personnel, facilities, and infrastructure at no charge; there is no financial investment or equity stake. Particularly relevant for govtech, smart city, or civic tech founders.", "website": "https://www.durhamnc.gov/3165/Innovate-Durham", "address": "", "logo": null}, "Provident1898": {"description": "Provident1898 is a Black-centric coworking and entrepreneur community located in the historic NC Mutual Life Insurance Building on Durham's Parrish Street—the heart of what was once called \"Black Wall Street.\" The 15,000 sq ft space includes 22 dedicated offices, four conference rooms, a large training room, and a fitness center, offering hot desks, dedicated desks, private suites, and event space. Provident1898 serves entrepreneurs, leaders, and artists in the Triangle with a particular focus on empowering underrepresented founders.", "website": "https://provident1898.com/", "address": "", "logo": null}, "On Deck": {"description": "On Deck is a remote-first community and fellowship program for ambitious founders, operators, and executives. Offers structured fellowships (On Deck Founders, etc.) and cohort-based programs. Known for high-caliber peer networks and async learning. Relevant to Triangle founders as a remote/national community.", "website": "https://www.beondeck.com/", "address": "", "logo": null}, "TiE Carolinas": {"description": "TiE Carolinas is the Carolinas chapter of TiE Global, a nonprofit providing mentoring, education, networking, funding access, and incubation for entrepreneurs. Based in Morrisville, NC, it is part of a worldwide network spanning 60+ chapters. Connects Triangle founders to a global network of investors and serial entrepreneurs.", "website": "https://carolinas.tie.org/", "address": "", "logo": null}};</script>
