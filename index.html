epreneurship in the Triangle — particularly among underserved and under-resourced communities.", "website": "https://www.innovateraleigh.com/", "address": "", "logo": null}, "echo": {"description": "echo is a community-led nonprofit empowering entrepreneurs of all ages and stages in Durham, NC. They offer youth programs (Future Founders, Shiboka, Teens Tackle), adult business workshops (Routes to Results accelerator), mentorship, and regular community events. Now moving to a new Downtown Durham space. 580+ entrepreneurs supported and 128+ businesses launched.", "website": "https://www.echo-nc.org/", "address": "404 Hunt St. Suite 500 Durham, NC 27701", "logo": null}, "Morning Grind": {"description": "A morning series for Triangle entrepreneurs to learn, connect, and grow through interactive talks, networking, and practical insights.", "website": "https://morninggrindseries.com/", "address": "", "logo": null}, "Y Combinator": {"description": "Y Combinator is the world's most prestigious startup accelerator, providing $500K in funding plus MFN on a $1.5M SAFE, mentorship, and a powerful global alumni network. 10-week programs run twice per year in San Francisco. Many Triangle founders have participated. Highly competitive.", "website": "https://www.ycombinator.com/", "address": "", "logo": null}, "Triangle TechBreakfast": {"description": "", "website": "", "address": "", "logo": null}, "Bullhouse Ventures": {"description": "Bullhouse Ventures is a Durham-based 'founder living room' — a coworking and event space combined with an active investment program. Founders Austin Armstrong and Austin Carroll write individual checks and form SPVs for portfolio companies, focusing on fintech, sports tech, health tech, defense tech, and martech. Free coworking space is offered to companies they invest in. Launched publicly at RDSW 2026 as part of Durham's talent retention strategy.", "website": "https://bullhouseventures.com/", "address": "", "logo": null}, "NC TECH": {"description": "NC TECH (North Carolina Technology Association) fosters growth and innovation in NC's technology sector, serving a network of corporations, investors, SMBs, startups, nonprofits, and institutional stakeholders. Offers an NC TECH for Startups membership tier with increased visibility, business connections, and ecosystem perks.", "website": "https://www.nctech.org/", "address": "", "logo": null}, "American Underground": {"description": "American Underground is a tech hub and coworking space in downtown Durham. With 25,000+ sq ft across multiple locations (including a 2026 return to American Tobacco Campus), AU supports 275+ startups with coworking, private offices, community events, pitch competitions, workshops, and access to top Triangle tech leaders.", "website": "https://americanunderground.com/", "address": "324 Blackwell St Suite 900, Durham, NC 27701", "logo": null}, "Cofounders Capital": {"description": "Cofounders Capital is a Cary, NC-based seed fund focused on enterprise SaaS and B2B technology startups. Founded by serial entrepreneur David Gardner, the fund includes 90+ advisors and mentors. Named North Carolina's most active venture fund by CB Insights in 2021. Has backed notable Triangle companies including early-stage Pendo. Invests primarily at pre-seed and seed.", "website": "https://www.cofounderscapital.com/", "address": "", "logo": null}, "NC SBTDC": {"description": "The NC Small Business and Technology Development Center (SBTDC), administered by NC State University on behalf of the UNC System, provides free and confidential management counseling, business development programs, and funding resources to startups and growing businesses across all 100 NC counties. Part of the national SBDC network with SBA support.", "website": "https://sbtdc.org/", "address": "", "logo": null}, "NC IDEA Foundation": {"description": "NC IDEA is a private 501(c)(3) foundation that advances entrepreneurship across North Carolina through grant programs: MICRO ($10K address": "", "logo": null}, "1 Million Cups": {"description": "1 Million Cups is a free Kauffman Foundation program where entrepreneurs present their ventures to a community audience over coffee, receive feedback, and make connections. The Durham chapter is hosted by echo at their community hub. Weekly format with a focus on early-stage founders.", "website": "https://www.1millioncups.com/s/account/0014W00002AqQfOQAV/durham-nc", "address": "", "logo": null}, "Raleigh Startup Founder 101": {"description": "", "website": "", "address": "", "logo": null}, "Durham Tech Small Business Center": {"description": "Durham Technical Community College's Small Business Center supports for-profit and nonprofit startups and entrepreneurs with free information, counseling, and tools covering business planning, marketing, legal, accounting, and financial management.", "website": "https://www.durhamtech.edu/small-business-center", "address": "", "logo": null}, "Triangle Business Journal": {"description": "Triangle Business Journal covers business news for the Raleigh-Durham-Chapel Hill metro. An important resource for founders tracking funding rounds, company news, and ecosystem developments.", "website": "https://www.bizjournals.com/triangle/", "address": "", "logo": null}, "DareToShift": {"description": "Most people network. We build friendships. Most events end when the venue closes. Ours keep going. Most communities optimize for reach. We optimize for depth.\n\nDareToShift exists because the loneliness of building is real—and it doesn’t have to be.\n\nWe believe the support system is the strategy. That the right conversation at the right moment changes everything. That the person next to you at a picnic might be your next co-founder, investor, or best friend.\n\nWe’re not a conference. Not a networking group. Not a mastermind.\n\nWe’re a community of founders, funders, builders, and operators who take their work seriously and their people even more seriously. We break bread, throw parties, host game nights, do rooftops, and build real relationships that outlast any business card.\n\nIf you chose the harder, realer, more interesting path…this is your room.\n\nLearn more and connect at DareToShift.com", "website": "https://daretoshift.com", "address": "", "logo": null}, "NC Biotechnology Center": {"description": "The North Carolina Biotechnology Center is a state-supported nonprofit that connects university researchers, startups, job seekers, and industry in the life sciences sector. Headquartered in Research Triangle Park with offices across the state, it offers grants, business loans, and awards to emerging biotech ventures.", "website": "https://www.ncbiotech.org/", "address": "", "logo": null}, "Raleigh Founded": {"description": "Raleigh Founded (formerly HQ Raleigh) is a membership-based coworking and community space for startups, remote workers, and entrepreneurs. Operates multiple locations across Raleigh (including North Street and Centennial Campus). Hosts networking events, workshops, fireside chats, and serves as a venue for ecosystem events including Morning Grind.", "website": "https://www.raleighfounded.com/", "address": "", "logo": null}, "Daring Studios": {"description": "Daring Studios is a strategic creative studio guiding solopreneurs, freelancers, founders, and creatives through inflection points in your solo business.  ", "website": "https://www.daringstudios.com/", "address": "", "logo": null}, "Triangle Startup Collective": {"description": "Triangle Startup Collective is a Raleigh-Durham-Chapel Hill meetup community for founders and aspiring entrepreneurs. Regular events include networking, workshops, pitch practice, and idea-sharing sessions focused on technology, business growth, and startup fundamentals.", "website": "https://www.meetup.com/triangle-startup-collective/", "address": "", "logo": null}, "Wyrick Robbins": {"description": "Wyrick Robbins is a Raleigh-based law firm specializing in corporate, technology, rograms with $100K investment. They also run gBETA, a free 7-week pre-accelerator. Relevant to Triangle founders as a national program with Southeastern presence.", "website": "https://www.gener8tor.com/", "address": "", "logo": null}, "500 Global": {"description": "500 Global (formerly 500 Startups) is a global VC firm and accelerator with $2.7B+ AUM, backing 5,000+ companies in 80+ countries. Runs flagship accelerator programs and invests across stages. Relevant to Triangle founders as a national funding and program resource.", "website": "https://500.co/", "address": "", "logo": null}, "On Deck": {"description": "On Deck is a remote-first community and fellowship program for ambitious founders, operators, and executives. Offers structured fellowships (On Deck Founders, etc.) and cohort-based programs. Known for high-caliber peer networks and async learning. Relevant to Triangle founders as a remote/national community.", "website": "https://www.beondeck.com/", "address": "", "logo": null}, "TiE Carolinas": {"description": "TiE Carolinas is the Carolinas chapter of TiE Global, a nonprofit providing mentoring, education, networking, funding access, and incubation for entrepreneurs. Based in Morrisville, NC, it is part of a worldwide network spanning 60+ chapters. Connects Triangle founders to a global network of investors and serial entrepreneurs.", "website": "https://carolinas.tie.org/", "address": "", "logo": null}};</script>
