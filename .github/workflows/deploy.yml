name: Deploy Event Calendar

on:
  workflow_dispatch:
  schedule:
    - cron: '0 11 * * *'  # 6am EST / 7am EDT (11:00 UTC)

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build React app
        run: npm run build

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests --quiet

      - name: Inject approved events into built HTML
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
        run: |
          python3 - <<'PYEOF'
          import base64, json, os, pathlib, requests

          API_KEY = os.environ["AIRTABLE_API_KEY"]
          BASE_ID = "apprt7MFT8PcVhFY4"
          headers = {"Authorization": f"Bearer {API_KEY}"}

          def fetch_all(table, params=None):
              url = f"https://api.airtable.com/v0/{BASE_ID}/{table}"
              p = dict(params or {})
              records = []
              while True:
                  resp = requests.get(url, headers=headers, params=p, timeout=30)
                  if not resp.ok:
                      print(f"Airtable error {resp.status_code} on {table}: {resp.text}")
                  resp.raise_for_status()
                  data = resp.json()
                  records.extend(data.get("records", []))
                  offset = data.get("offset")
                  if not offset:
                      break
                  p["offset"] = offset
              return records

          def logo_data_uri(attachment):
              """Download an Airtable attachment and return a base64 data URI, or None on failure."""
              try:
                  resp = requests.get(attachment["url"], timeout=15)
                  resp.raise_for_status()
                  mime = attachment.get("type", "image/png")
                  b64 = base64.b64encode(resp.content).decode()
                  return f"data:{mime};base64,{b64}"
              except Exception as e:
                  print(f"  Warning: failed to download logo ({attachment.get('filename')}): {e}")
                  return None

          # ── Organizations ──────────────────────────────────────────────
          orgs_by_id = {}   # rec_id -> org name
          org_profiles = {} # org name -> profile dict (for events page)
          for r in fetch_all("Organizations"):
              f = r.get("fields", {})
              name = f.get("Organization Name", "").strip()
              if not name:
                  continue
              orgs_by_id[r["id"]] = name

              # Logo: take first attachment, download, embed as data URI
              logo = None
              attachments = f.get("Logo") or []
              if attachments:
                  logo = logo_data_uri(attachments[0])

              org_profiles[name] = {
                  "description": f.get("Description", ""),
                  "website":     f.get("Website", ""),
                  "address":     f.get("Address", ""),
                  "logo":        logo,
              }
          logos_loaded = sum(1 for p in org_profiles.values() if p["logo"])
          print(f"Loaded {len(org_profiles)} organization(s), {logos_loaded} with logos")

          def resolve_org(field_val):
              """Linked record field returns a list of rec IDs; resolve to name."""
              if isinstance(field_val, list) and field_val:
                  return orgs_by_id.get(field_val[0], "")
              if isinstance(field_val, str):
                  return field_val
              return ""

          # ── Events ────────────────────────────────────────────────────
          event_records = fetch_all("Events", {
              "filterByFormula": "AND({Approved}=TRUE(), {Archived}!=TRUE())",
              "sort[0][field]": "Date",
              "sort[0][direction]": "asc",
          })

          events = []
          for r in event_records:
              f = r.get("fields", {})
              events.append({
                  "id":            r["id"],
                  "name":          f.get("Name", ""),
                  "date":          f.get("Date", ""),
                  "friendly_date": f.get("Friendly Date/Time", ""),
                  "start_time":    f.get("Start Time", ""),
                  "end_time":      f.get("End Time", ""),
                  "location":      f.get("Location", ""),
                  "city":          f.get("City", ""),
                  "description":   f.get("Description", ""),
                  "event_type":    f.get("Event Type", ""),
                  "topic_tags":    f.get("Topic Tags", []),
                  "source_url":    f.get("Source URL", ""),
                  "host":          resolve_org(f.get("Organization")),
                  "editors_pick":  bool(f.get("Editors Pick", False)),
                  "is_free":       not bool(f.get("Paid", False)),
                  "stage_focus":   f.get("Stage Focus", []),
                  "industry":      f.get("Industry", []),
                  "format":        f.get("Format", []),
                  "short_description": (f.get("Short description") or {}).get("value", "") if isinstance(f.get("Short description"), dict) else "",
              })
          print(f"Loaded {len(events)} approved event(s)")

          def safe_json(obj):
              s = json.dumps(obj, ensure_ascii=False)
              return s.replace("</", "<\\/")

          # ── Inject into dist/index.html ────────────────────────────────
          dist_index = pathlib.Path("dist/index.html")
          html = dist_index.read_text(encoding="utf-8")

          if "__EVENTS_JSON__" not in html:
              raise RuntimeError("Placeholder __EVENTS_JSON__ not found in dist/index.html")
          if "__ORG_PROFILES_JSON__" not in html:
              raise RuntimeError("Placeholder __ORG_PROFILES_JSON__ not found in dist/index.html")

          html = html.replace("__EVENTS_JSON__", safe_json(events))
          html = html.replace("__ORG_PROFILES_JSON__", safe_json(org_profiles))
          dist_index.write_text(html, encoding="utf-8")
          print("Injected events data into dist/index.html")

          print("All injections complete.")
          PYEOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: events.timscales.com
          commit_message: "Deploy event calendar [${{ github.run_number }}]"
