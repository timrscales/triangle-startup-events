name: Weekly Email and LinkedIn Draft

on:
  schedule:
    - cron: '0 15 * * 1'  # 11:00 AM ET on Mondays (UTC-4 in EDT), after daily.yml
  workflow_dispatch:       # Allow manual runs from the Actions tab

permissions:
  contents: read

jobs:
  weekly-drafts:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Gmail credentials
        run: |
          echo '${{ secrets.GMAIL_CREDENTIALS_JSON }}' > gmail_credentials.json
          echo '${{ secrets.GMAIL_TOKEN_JSON }}' > gmail_token.json

      - name: Draft weekly subscriber email
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          GMAIL_CREDENTIALS_FILE: gmail_credentials.json
          GMAIL_TOKEN_FILE: gmail_token.json
        run: python draft_email.py

      - name: Send LinkedIn post draft
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          GMAIL_CREDENTIALS_FILE: gmail_credentials.json
          GMAIL_TOKEN_FILE: gmail_token.json
        run: python linkedin_post.py
