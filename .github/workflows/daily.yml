name: Daily Startup Events Finder

on:
  schedule:
    - cron: '0 14 * * *'  # 10:00 AM ET (UTC-4 in EDT)
  workflow_dispatch:       # Allow manual runs from the Actions tab

permissions:
  contents: read
  actions: write           # Required to trigger deploy.yml

jobs:
  find-events:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: playwright install chromium

      - name: Find and sync events
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
        run: python find_events.py

      - name: Trigger calendar deploy
        if: success()
        run: gh workflow run deploy.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
